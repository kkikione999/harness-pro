# scaffold/ci-pipeline.yml
# GitHub Actions CI pipeline for Open-ClaudeCode.
# Runs all controllability gates and observability checks.
# Copy to .github/workflows/ci.yml to activate.

name: Controllability Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: Golden Principle linters (existing)
  golden-principles:
    name: "Golden Principles (GP-001..GP-008)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run GP Linters
        run: |
          python3 rules/scripts/check.py --verbose
        working-directory: ${{ github.workspace }}

  # Job 2: Import direction analysis
  import-direction:
    name: "Import Direction"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Import Direction Linter
        run: |
          chmod +x scaffold/lint-import-direction.sh
          bash scaffold/lint-import-direction.sh
        working-directory: ${{ github.workspace }}

  # Job 3: Dependency cycle detection
  dependency-analysis:
    name: "Dependency Cycles"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Dependency Analysis
        run: |
          chmod +x scaffold/analyze-deps.sh
          bash scaffold/analyze-deps.sh
        working-directory: ${{ github.workspace }}

      - name: Upload Dependency Graph
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: .scaffolding/deps/
          retention-days: 30

  # Job 4: Tool signature validation
  tool-signatures:
    name: "Tool Signatures"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Tool Signature Validator
        run: |
          chmod +x scaffold/validate-tool-signatures.sh
          bash scaffold/validate-tool-signatures.sh
        working-directory: ${{ github.workspace }}

  # Job 5: Export/import ratio (dead code detection)
  dead-code:
    name: "Dead Code Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Export/Import Analysis
        run: |
          chmod +x scaffold/lint-export-counts.sh
          bash scaffold/lint-export-counts.sh
        working-directory: ${{ github.workspace }}
        # This is a warning-only check, does not fail the build

  # Job 6: Observability infrastructure generation
  observability:
    name: "Observability Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Observability Analysis
        run: |
          chmod +x scaffold/instrument-tool-lifecycle.sh
          chmod +x scaffold/trace-query-pipeline.sh
          chmod +x scaffold/audit-state-mutations.sh
          chmod +x scaffold/collect-metrics.sh
          bash scaffold/instrument-tool-lifecycle.sh
          bash scaffold/trace-query-pipeline.sh
          bash scaffold/audit-state-mutations.sh
          bash scaffold/collect-metrics.sh
        working-directory: ${{ github.workspace }}

      - name: Upload Observability Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-artifacts
          path: .scaffolding/observability/
          retention-days: 30

  # Summary job
  all-gates:
    name: "All Gates Summary"
    runs-on: ubuntu-latest
    needs: [golden-principles, import-direction, dependency-analysis, tool-signatures]
    if: always()
    steps:
      - name: Check gate results
        run: |
          echo "Golden Principles: ${{ needs.golden-principles.result }}"
          echo "Import Direction: ${{ needs.import-direction.result }}"
          echo "Dependency Cycles: ${{ needs.dependency-analysis.result }}"
          echo "Tool Signatures: ${{ needs.tool-signatures.result }}"

          if [[ "${{ needs.golden-principles.result }}" == "failure" ]] || \
             [[ "${{ needs.import-direction.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-analysis.result }}" == "failure" ]] || \
             [[ "${{ needs.tool-signatures.result }}" == "failure" ]]; then
            echo "FAILED: One or more gates failed"
            exit 1
          fi

          echo "PASSED: All gates passed"
