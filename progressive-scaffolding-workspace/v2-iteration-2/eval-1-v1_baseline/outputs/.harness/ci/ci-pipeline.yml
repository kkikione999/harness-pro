# ci-pipeline.yml — GitHub Actions CI for Open-ClaudeCode
# Generated by progressive-scaffolding v1
#
# This CI pipeline runs the project's scaffolding verification:
# - Lint checks (import direction + general lint)
# - Dependency cycle detection
# - Observability health checks
# - Build verification
#
# Place this file at: .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check import direction
        run: |
          if [ -f ".harness/controllability/lint-import-direction.sh" ]; then
            .harness/controllability/lint-import-direction.sh --verbose || true
          fi

      - name: Run lint checks
        run: |
          if [ -f ".harness/controllability/lint-check.sh" ]; then
            .harness/controllability/lint-check.sh || true
          fi

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect cycles
        run: |
          if [ -f ".harness/controllability/analyze-deps.sh" ]; then
            .harness/controllability/analyze-deps.sh --cycles || true
          fi

  health:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run observability health check
        run: |
          if [ -f ".harness/observability/health.sh" ]; then
            .harness/observability/health.sh --json
          fi

  verify:
    name: Verification
    runs-on: ubuntu-latest
    needs: [lint, dependency-check, health]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Run full verification
        run: |
          if [ -f ".harness/controllability/verify.sh" ]; then
            .harness/controllability/verify.sh
          fi

      - name: Run automated tests
        run: |
          if [ -f ".harness/controllability/test-auto.sh" ]; then
            .harness/controllability/test-auto.sh
          fi
