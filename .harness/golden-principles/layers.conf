# Architecture Layer Definitions
# ============================================================
# Rule: Higher layers CAN import lower layers. Reverse is FORBIDDEN.
# Format: layer_number  directory_name  # optional comment
#
# When P0-005 runs, it checks that no file in a lower layer
# imports from a higher layer. This keeps the dependency graph
# acyclic and modules independently testable.
#
# Customize for YOUR project. Examples below.
# Delete or comment out lines that don't apply.
# If this file is empty or missing, P0-005 auto-skips.
# ============================================================

# Layer 0: Pure type definitions, no internal dependencies
# 0  types
# 0  models
# 0  entities

# Layer 1: Utility functions, pure logic
# 1  utils
# 1  helpers
# 1  shared

# Layer 2: Configuration, constants
# 2  config
# 2  constants

# Layer 3: Business logic, domain services
# 3  services
# 3  core
# 3  domain

# Layer 4: Interface layer (HTTP handlers, CLI, UI)
# 4  api
# 4  handlers
# 4  controllers
# 4  ui
# 4  cli
